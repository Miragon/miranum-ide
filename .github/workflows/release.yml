name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (no commit, tag, release, or publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: bpmn-vscode-modeler-release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PAT }}

      - name: Corepack enable
        run: corepack enable && corepack prepare yarn@stable --activate

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}"

      - name: Bump version
        id: version
        run: |
          PKG_PATH="./apps/modeler-plugin/package.json"
          PKG_NAME=$(node -e "console.log(require('$PKG_PATH').name)")
          yarn workspace "$PKG_NAME" version "${{ inputs.release-type }}"
          yarn version apply --all
          NEW_VERSION=$(node -e "console.log(require('$PKG_PATH').version)")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; aborting." && exit 1
          fi

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Install vsce
        run: npm install -g @vscode/vsce@3.2.2

      - name: Package vsix
        working-directory: dist/apps/modeler-plugin
        run: vsce package --out bpmn-modeler-plugin.vsix --yarn --no-dependencies

      - name: Commit and tag
        if: success() && inputs.dry-run == false
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          git add apps/modeler-plugin/package.json
          git commit -m "chore(release): bump version to ${NEW_VERSION}"
          git push origin HEAD
          git tag -a "v${NEW_VERSION}" -m "release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        if: success() && inputs.dry-run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/apps/modeler-plugin/bpmn-modeler-plugin.vsix

      - name: Publish to VS Code Marketplace
        if: success() && inputs.dry-run == false
        working-directory: dist/apps/modeler-plugin
        run: vsce publish --yarn --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PUBLISH }}
